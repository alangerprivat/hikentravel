{% extends \"base.html\" %}

{% block title %}Anmelden - Hike and Travel{% endblock %}

{% block content %}
<div class=\"row justify-content-center\">
    <div class=\"col-lg-5\">
        <div class=\"card mt-5\">
            <div class=\"card-body p-5\">
                <div class=\"text-center mb-4\">
                    <h1 style=\"font-size: 3rem; margin-bottom: 1rem;\">🏔️</h1>
                    <h2>Hike and Travel</h2>
                    <p class=\"text-muted\">Deine Wanderungen erfassen und teilen</p>
                </div>

                <form method=\"POST\">
                    <div class=\"mb-3\">
                        <label for=\"username\" class=\"form-label\">Benutzername</label>
                        <input type=\"text\" class=\"form-control form-control-lg\" id=\"username\" name=\"username\" required autofocus>
                    </div>

                    <div class=\"mb-4\">
                        <label for=\"password\" class=\"form-label\">Passwort</label>
                        <input type=\"password\" class=\"form-control form-control-lg\" id=\"password\" name=\"password\" required>
                    </div>

                    <button type=\"submit\" class=\"btn btn-primary btn-lg w-100\">
                        <i class=\"bi bi-box-arrow-in-right\"></i> Anmelden
                    </button>
                </form>

                <hr class=\"my-4\">

                <div class=\"alert alert-info text-center\" role=\"alert\">
                    <small>Standard: <strong>admin</strong> / <strong>admin</strong></small>
                </div>
            </div>
        </div>

        <div class=\"text-center mt-4\">
            <p class=\"text-muted\">
                <i class=\"bi bi-shield-lock\"></i> Sichere Anmeldung erforderlich
            </p>
        </div>
    </div>
</div>
{% endblock %}
